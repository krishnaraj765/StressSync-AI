services:
  - type: web_service
    name: StressSync-Backend
    env: python
    branch: main
    plan: starter
    root: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port ${PORT}

  - type: static_site
    name: StressSync-Frontend
    env: node
    branch: main
    plan: starter
    root: stress-frontend
    buildCommand: npm install && npm run build
    publishPath: build
